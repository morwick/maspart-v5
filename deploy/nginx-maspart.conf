# MASPART — Nginx reverse proxy
# Frontend (Next.js) di / , Backend (FastAPI) di /api dan /health.
# Satu origin → tidak ada masalah CORS.
#
# Pasang:  /etc/nginx/sites-available/maspart  → symlink ke sites-enabled
# Lihat deploy/DEPLOY.md langkah Nginx.

server {
    listen 80;
    listen [::]:80;

    # Ganti "_" dengan domain Anda nanti (mis. app.contoh.com). "_" = terima semua host (akses via IP).
    server_name _;

    # Upload foto "Cari by Foto" sampai 15 MB — beri kelonggaran.
    client_max_body_size 20m;

    # ── Backend FastAPI ──
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cari-by-Foto (DINOv2 di CPU) + load model pertama bisa lama.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001;
    }

    # ── Frontend Next.js ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
